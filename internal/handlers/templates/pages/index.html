{{ define "title" }}Dashboard{{ end }}
{{ define "script-tags" }}{{ end }}
{{ define "page-content" }}
  {{ if not .HasClicks }}
    <div
      class="flex flex-col items-center justify-center gap-4 pt-16 text-center"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="size-16 text-base-content/30"
        fill="none"
        viewBox="0 0 24 24"
        stroke="currentColor"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="1.5"
          d="M3 6l3 1m0 0l-3 9a5.002 5.002 0 006.001 0M6 7l3 9M6 7l6-2m6 2l3-1m-3 1l-3 9a5.002 5.002 0 006.001 0M18 7l3 9m-3-9l-6-2m0-2v2m0 16V5m0 16H9m3 0h3"
        />
      </svg>
      <div>
        <p class="text-lg font-semibold">No clicks yet</p>
        <p class="text-base-content/60 mt-1">Click button below to add one!.</p>
      </div>
      <a href="/accounts" class="btn btn-primary">Add an account</a>
    </div>
  {{ else }}
    <div class="flex flex-col gap-4">
      {{ range .Clicks }}
        <div class="card bg-base-200 shadow">
          <div class="card-body items-center text-center gap-1">
            <p
              class="text-sm font-semibold uppercase tracking-wide text-base-content/60"
            >
              Click info
            </p>
            <p class="text-4xl font-bold mt-1">
              Click on
              {{ .LastModified }}
            </p>
          </div>
        </div>
      {{ end }}
    </div>
  {{ end }}
{{ end }}
